name: Bug Report
description: Report unexpected behavior in the Terraform provider.
title: "[Bug]: "
labels: ["bug", "triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please be as specific as possible — it speeds up the fix significantly.

        Before opening an issue, please check that:
        - You are running the latest provider version
        - The same behavior is reproducible in a minimal configuration
        - The issue is not already reported

  - type: input
    id: provider_version
    attributes:
      label: Provider version
      description: The version of `terraform-provider-openrouter`. Run `terraform providers` to find it.
      placeholder: "e.g. v0.3.1"
    validations:
      required: true

  - type: input
    id: terraform_version
    attributes:
      label: Terraform / OpenTofu version
      description: Output of `terraform version` or `tofu version`.
      placeholder: "e.g. Terraform v1.9.3"
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Affected component
      description: Which part of the provider is affected?
      options:
        - Resource — openrouter_*
        - Data source — data.openrouter_*
        - Provider configuration / authentication
        - Import
        - Documentation
        - Other
    validations:
      required: true

  - type: input
    id: resource_name
    attributes:
      label: Affected resource or data source
      description: The full resource or data source type name, if applicable.
      placeholder: "e.g. openrouter_model, data.openrouter_models"
    validations:
      required: false

  - type: textarea
    id: terraform_config
    attributes:
      label: Terraform configuration
      description: >
        Minimal reproducible configuration. Remove any sensitive values — do **not** paste API keys or credentials.
      render: hcl
      placeholder: |
        terraform {
          required_providers {
            openrouter = {
              source  = "cloudopsworks/openrouter"
              version = "~> 0.3"
            }
          }
        }

        provider "openrouter" {}

        resource "openrouter_..." "example" {
          ...
        }
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect Terraform to do?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead? Include the full error message or plan/apply output.
      render: shell
    validations:
      required: true

  - type: textarea
    id: steps_to_reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps that reliably trigger the bug.
      placeholder: |
        1. Configure the provider with ...
        2. Run `terraform plan`
        3. Observe error: ...
    validations:
      required: true

  - type: textarea
    id: debug_output
    attributes:
      label: Debug output (optional)
      description: >
        Run with `TF_LOG=DEBUG terraform apply` and paste relevant lines.
        Remove any sensitive values before pasting.
      render: shell
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: >
        Anything else that helps narrow down the problem — OS/platform, CI environment,
        related issues, or links to relevant OpenRouter API documentation.
    validations:
      required: false
