name: Documentation Issue
description: Report missing, incorrect, or unclear provider documentation.
title: "[Docs]: "
labels: ["documentation", "triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Use this template to report problems with the provider documentation — missing examples,
        incorrect attribute descriptions, outdated guides, or confusing explanations.

        For bugs in provider behavior, use the **Bug Report** template instead.

  - type: dropdown
    id: doc_type
    attributes:
      label: Documentation type
      description: Which part of the documentation is affected?
      options:
        - Resource documentation
        - Data source documentation
        - Provider configuration guide
        - Import guide
        - Example / tutorial
        - README
        - Changelog
        - Other
    validations:
      required: true

  - type: input
    id: doc_location
    attributes:
      label: Document or page
      description: Link to the affected documentation page or file path in the repository.
      placeholder: "e.g. docs/resources/model.md or https://registry.terraform.io/providers/..."
    validations:
      required: false

  - type: dropdown
    id: issue_type
    attributes:
      label: Issue type
      options:
        - Missing documentation
        - Incorrect information
        - Outdated information
        - Unclear or confusing explanation
        - Missing example
        - Broken link
        - Typo / formatting
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Describe what is wrong, missing, or unclear. Quote the relevant passage if applicable.
    validations:
      required: true

  - type: textarea
    id: suggested_fix
    attributes:
      label: Suggested improvement
      description: If you know what the correct or improved content should be, describe it here.
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Links to related resources, API documentation, or anything else that helps.
    validations:
      required: false
